<!doctype html>
<html>
        <head>
                <meta charset="utf-8" />
                <meta
                        name="viewport"
                        content="width=device-width, initial-scale=1.0, shrink-to-fit=no"
                />
                <title>Infamous Proxy</title>

                <link rel="shortcut icon" content="favicon.webp" />
                <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/hugeicons@1.0.0/fonts/hugeicons.css" />
                <link rel="stylesheet" href="index.css" />
                <script src="/scram/scramjet.all.js"></script>
                <script src="register-sw.js" defer></script>
                <script src="search.js" defer></script>
                <script src="index.js" defer></script>
        </head>

        <body>
                <div class="home-screen" id="sj-home">
                        <div class="flex-center logo-wrapper header-center">
                                <h1>Infamous Proxy</h1>
                        </div>

                        <form id="sj-form" class="flex-center">
                                <input
                                        id="sj-search-engine"
                                        value="https://duckduckgo.com/?q=%s"
                                        type="hidden"
                                />
                                <div class="search-wrap">
                                        <i class="hgi hgi-stroke hgi-search-01"></i>
                                        <input id="sj-address" type="text" placeholder="Search the web or enter a URL" autocomplete="off" spellcheck="false" />
                                </div>
                        </form>

                        <div class="quicklinks" id="sj-quicklinks">
                                <a class="ql-card" data-url="https://www.youtube.com">
                                        <img class="ql-icon" src="icon-youtube.png" alt="YouTube" />
                                        <span>YouTube</span>
                                </a>
                                <a class="ql-card" data-url="https://gemini.google.com/">
                                        <img class="ql-icon" src="icon-gemini.png" alt="Gemini" />
                                        <span>Gemini</span>
                                </a>
                                <a class="ql-card" data-url="https://www.footballia.net">
                                        <img class="ql-icon" src="icon-footballia.png" alt="Footballia" />
                                        <span>Footballia</span>
                                </a>
                                <a class="ql-card" data-url="https://justanime.to">
                                        <img class="ql-icon" src="icon-justanime.png" alt="JustAnime" />
                                        <span>JustAnime</span>
                                </a>
                                <a class="ql-card" data-url="https://cinekada.com">
                                        <img class="ql-icon" src="icon-cinekada.png" alt="Cinekada" />
                                        <span>Cinekada</span>
                                </a>
                                <a class="ql-card" data-url="https://flixbaba.com">
                                        <img class="ql-icon" src="icon-flixbaba.png" alt="Flixbaba" />
                                        <span>Flixbaba</span>
                                </a>
                        </div>

                        <div class="desc left-margin">
                                <p id="sj-error"></p>
                                <pre id="sj-error-code"></pre>
                        </div>
                </div>

                <div class="browser-ui" id="sj-browser" style="display:none">
                        <div class="nav-bar">
                                <button id="nav-back" title="Back"><i class="hgi hgi-stroke hgi-arrow-left-01"></i></button>
                                <button id="nav-forward" title="Forward"><i class="hgi hgi-stroke hgi-arrow-right-01"></i></button>
                                <button id="nav-refresh" title="Refresh"><i class="hgi hgi-stroke hgi-reload"></i></button>
                                <div class="nav-spacer"></div>
                                <button id="nav-home" title="Home"><i class="hgi hgi-stroke hgi-home-01"></i></button>
                        </div>
                        <iframe id="sj-frame"></iframe>
                </div>
        </body>
</html>
